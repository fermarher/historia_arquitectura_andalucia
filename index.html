<style>
:root{
  /* Junta de Andalucía Corporate Colors */
  --green-primary:#007932;   /* Pantone 356C */
  --green-secondary:#368f3f; /* Pantone 7740C */
  --green-dark:#005a25;
  --teal:#007078;            /* Pantone 322C */
  --black-corp:#2e2925;      /* Pantone Black C */
  --gray-dark:#555559;       /* Cool Gray 11C */
  --gray-mid:#9b9b9a;        /* Cool Gray 7C */
  --gray-light:#c9c9c9;      /* Cool Gray 3C */
  /* UI */
  --bg:#f4f5f0;
  --card-bg:#ffffff;
  --border:#d8ddd5;
  --shadow:0 2px 8px rgba(0,60,20,.1);
  --shadow-hover:0 6px 20px rgba(0,60,20,.2);
  --text:var(--black-corp);
  --text-light:var(--gray-dark);
  /* Fonts */
  --font-head:'Montserrat',sans-serif;
  --font-body:'Source Sans 3',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

/* HEADER */
header{
  background:linear-gradient(135deg,var(--green-dark) 0%,var(--green-primary) 55%,var(--green-secondary) 100%);
  color:#fff;padding:14px 28px;display:flex;align-items:center;gap:16px;
  box-shadow:0 3px 12px rgba(0,80,30,.35);position:sticky;top:0;z-index:100
}
.header-logo{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header-text h1{font-family:var(--font-head);font-size:1.25rem;font-weight:800;letter-spacing:.3px;line-height:1.2}
.header-text p{font-size:.82rem;opacity:.85;margin-top:2px;font-weight:300}
.header-right{margin-left:auto;text-align:right}
.header-right span{font-size:.78rem;opacity:.75;display:block;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.header-right strong{font-size:1.5rem;font-family:var(--font-head);font-weight:700}

/* LAYOUT */
.app-layout{display:flex;min-height:calc(100vh - 80px)}

/* SIDEBAR */
aside{width:265px;flex-shrink:0;background:var(--card-bg);border-right:1px solid var(--border);
  padding:18px 14px;overflow-y:auto;height:calc(100vh - 80px);position:sticky;top:80px}
aside h2{font-family:var(--font-head);font-size:.68rem;letter-spacing:1.8px;text-transform:uppercase;
  color:var(--green-primary);margin-bottom:14px;padding-bottom:7px;border-bottom:2px solid var(--green-primary);
  font-weight:700}
.filter-group{margin-bottom:14px}
.filter-group label{display:block;font-size:.75rem;color:var(--gray-dark);margin-bottom:4px;
  font-weight:600;font-family:var(--font-head)}
.filter-group select,.filter-group input{
  width:100%;padding:7px 10px;border:1.5px solid var(--border);
  border-radius:5px;background:#fff;font-size:.82rem;color:var(--text);font-family:var(--font-body);
  appearance:none;-webkit-appearance:none;transition:border-color .2s;cursor:pointer}
.filter-group select:focus,.filter-group input:focus{
  outline:none;border-color:var(--green-primary);box-shadow:0 0 0 3px rgba(0,121,50,.12)}
.search-wrap{position:relative}
.search-wrap input{padding-left:30px}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--gray-mid);font-size:.85rem}
.btn-reset{width:100%;padding:8px;background:var(--green-primary);color:#fff;border:none;border-radius:5px;
  cursor:pointer;font-size:.82rem;font-family:var(--font-head);font-weight:600;margin-top:4px;
  letter-spacing:.3px;transition:background .2s}
.btn-reset:hover{background:var(--green-dark)}
.results-count{font-size:.75rem;color:var(--gray-mid);text-align:center;padding:9px 0;
  border-top:1px solid var(--border);margin-top:10px;font-weight:500}

/* MAIN */
main{flex:1;padding:22px;overflow-x:hidden}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.toolbar h2{font-size:.88rem;color:var(--text-light);font-family:var(--font-head);font-weight:600}
.pagination{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.pagination button{padding:5px 11px;border:1.5px solid var(--border);background:var(--card-bg);
  border-radius:4px;cursor:pointer;font-size:.78rem;color:var(--text);font-family:var(--font-head);
  font-weight:600;transition:all .15s}
.pagination button:hover:not(:disabled){background:var(--green-primary);color:#fff;border-color:var(--green-primary)}
.pagination button:disabled{opacity:.35;cursor:default}
.pagination button.active{background:var(--green-primary);color:#fff;border-color:var(--green-primary)}

/* GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;
  overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}
.card-num{background:var(--green-primary);color:#fff;font-size:.68rem;padding:3px 10px;
  display:inline-block;border-radius:0 0 5px 0;font-weight:700;letter-spacing:.5px;
  font-family:var(--font-head)}
.card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column}
.card-title{font-family:var(--font-head);font-size:.95rem;font-weight:700;color:var(--green-dark);
  margin:4px 0 8px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
.tag{font-size:.67rem;padding:2px 7px;border-radius:20px;font-weight:600;letter-spacing:.2px;
  font-family:var(--font-head)}
.tag-tema{background:#e8f5ee;color:#005a25;border:1px solid #a8d5b8}
.tag-estilo{background:#e6f2f3;color:#00464a;border:1px solid #9ecfd3}
.tag-prov{background:#fff3e0;color:#7a4000;border:1px solid #f5c880}
.card-muni{font-size:.77rem;color:var(--text-light);margin-bottom:5px}
.card-muni span{font-weight:600;color:var(--text)}
.card-autor{font-size:.73rem;color:var(--gray-mid);font-style:italic;margin-top:auto;padding-top:5px}
.card-desc{font-size:.77rem;color:var(--text-light);margin-top:5px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-light);grid-column:1/-1}
.empty-state .icon{font-size:3rem;margin-bottom:14px}
.empty-state h3{font-family:var(--font-head);font-size:1rem;margin-bottom:6px;font-weight:700}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;
  display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;
  animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--card-bg);border-radius:10px;width:100%;max-width:920px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);overflow:hidden;animation:slideUp .22s ease;position:relative}
@keyframes slideUp{from{transform:translateY(25px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.2);border:none;
  width:30px;height:30px;border-radius:50%;font-size:1rem;cursor:pointer;color:#fff;
  display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:10;
  font-family:var(--font-head);font-weight:700}
.modal-close:hover{background:rgba(255,255,255,.35)}
.modal-header{background:linear-gradient(135deg,var(--green-dark),var(--green-primary));
  color:#fff;padding:20px 50px 20px 22px}
.modal-num{font-family:var(--font-head);font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;
  opacity:.75;margin-bottom:3px;font-weight:600}
.modal-title{font-family:var(--font-head);font-size:1.35rem;font-weight:800;line-height:1.25}
.modal-body{padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:640px){.modal-body{grid-template-columns:1fr}}
.modal-info{grid-column:1/-1}
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 20px;margin-bottom:14px}
@media(max-width:480px){.info-grid{grid-template-columns:1fr}}
.info-item label{font-family:var(--font-head);font-size:.67rem;text-transform:uppercase;
  letter-spacing:.8px;color:var(--green-primary);font-weight:700}
.info-item p{font-size:.88rem;color:var(--text);margin-top:2px;line-height:1.45}
.modal-desc{font-size:.88rem;line-height:1.75;color:var(--text);
  background:#f0f6f2;border-left:3px solid var(--green-primary);padding:12px 15px;border-radius:0 6px 6px 0}
.modal-section-title{font-family:var(--font-head);font-size:.7rem;text-transform:uppercase;letter-spacing:1px;
  color:var(--green-primary);font-weight:700;margin-bottom:8px;padding-bottom:5px;
  border-bottom:2px solid var(--green-secondary)}
.map-container{border-radius:7px;overflow:hidden;border:1px solid var(--border)}
.map-container .leaflet-container{height:220px;width:100%}
.img-wrap{border-radius:7px;overflow:hidden;border:1px solid var(--border);background:#f0f6f2}
.monument-img{width:100%;height:240px;object-fit:cover;display:block}
.img-caption{font-size:.72rem;color:var(--gray-dark);padding:7px 10px;background:#f8faf8;
  border-top:1px solid var(--border);font-style:italic}
.img-loading{display:flex;align-items:center;justify-content:center;height:200px;
  background:#f0f6f2;border-radius:7px;color:var(--text-light);font-size:.85rem;
  border:1px solid var(--border)}
.img-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:200px;background:#f0f6f2;border-radius:7px;color:var(--text-light);gap:8px;
  border:1px solid var(--border)}
.img-placeholder .ph-icon{font-size:2.5rem;opacity:.35}
.img-placeholder .ph-text{font-size:.85rem;color:var(--gray-dark);font-weight:600;
  font-family:var(--font-head)}
.img-placeholder .ph-sub{font-size:.72rem;opacity:.6}
.no-muni-note{display:flex;align-items:center;justify-content:center;height:220px;
  background:#f0f6f2;border-radius:7px;border:1px solid var(--border);
  color:var(--gray-dark);font-size:.85rem;text-align:center;padding:20px;
  flex-direction:column;gap:8px}
.no-muni-note span{font-size:1.5rem}
/* attribution override */
.leaflet-control-attribution{font-size:9px!important}

/* SCROLLBAR */
aside::-webkit-scrollbar,.modal-overlay::-webkit-scrollbar{width:4px}
aside::-webkit-scrollbar-thumb,.modal-overlay::-webkit-scrollbar-thumb{background:var(--gray-light);border-radius:2px}

/* RESPONSIVE */
@media(max-width:900px){
  .app-layout{flex-direction:column}
  aside{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border)}
  .filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
}
@media(max-width:768px){
  header{padding:10px 14px}
  .header-text h1{font-size:1rem}
  main{padding:14px}
}
</style>

// Normalize text for fuzzy municipality matching
function norm(s) {
  return s ? s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim() : '';
}

// Build normalized OSM centers index
const OSM_NORM = {};
for (const [k,v] of Object.entries(OSM_CENTERS)) {
  OSM_NORM[norm(k)] = v;
}

// Find municipality center by name
function getMuniCenter(muniName) {
  if (!muniName || muniName === '—') return null;
  
  // Direct match
  let c = COORDS[muniName];
  if (c) return {lat: c.lat, lon: c.lon};
  
  // Try OSM centers
  const n = norm(muniName);
  if (OSM_NORM[n]) return OSM_NORM[n];
  
  // Try first word(s)
  const clean = muniName.split('(')[0].split('/')[0].trim();
  c = COORDS[clean];
  if (c) return {lat: c.lat, lon: c.lon};
  const cn = norm(clean);
  if (OSM_NORM[cn]) return OSM_NORM[cn];
  
  // Partial match
  for (const [k,v] of Object.entries(OSM_NORM)) {
    if (k.startsWith(cn) || cn.startsWith(k)) return v;
  }
  return null;
}

let filtered = [...MONUMENTOS];
let page = 1;
const PER_PAGE = 24;
let mapAndalucia = null, mapMuni = null;

// ─── INIT ─────────────────────────────────────────────────────────
function init() {
  populateSelect('f-tema', TEMAS);
  populateSelect('f-estilo', ESTILOS);
  populateSelect('f-provincia', PROVINCIAS);
  populateSelect('f-municipio', MUNICIPIOS);
  populateSelect('f-autor', AUTORES);
  addFilterListeners();
  render();
}

function populateSelect(id, items) {
  const sel = document.getElementById(id);
  items.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    sel.appendChild(o);
  });
}

function addFilterListeners() {
  ['f-tema','f-estilo','f-provincia','f-municipio','f-autor'].forEach(id =>
    document.getElementById(id).addEventListener('change', applyFilters));
  let t;
  document.getElementById('f-search').addEventListener('input', () => {
    clearTimeout(t); t = setTimeout(applyFilters, 280);
  });
}

// ─── FILTER ───────────────────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('f-search').value.trim().toLowerCase();
  const tema = document.getElementById('f-tema').value;
  const estilo = document.getElementById('f-estilo').value;
  const prov = document.getElementById('f-provincia').value;
  const muni = document.getElementById('f-municipio').value;
  const autor = document.getElementById('f-autor').value;

  filtered = MONUMENTOS.filter(m => {
    if (tema && m.tema !== tema) return false;
    if (estilo && m.estilo !== estilo) return false;
    if (prov && m.provincia !== prov) return false;
    if (muni && m.municipio !== muni) return false;
    if (autor && m.autor !== autor) return false;
    if (search) {
      const h = (m.nombre + ' ' + m.descripcion + ' ' + m.autor).toLowerCase();
      if (!h.includes(search)) return false;
    }
    return true;
  });
  page = 1;
  render();
}

function resetFilters() {
  ['f-tema','f-estilo','f-provincia','f-municipio','f-autor'].forEach(id =>
    document.getElementById(id).value = '');
  document.getElementById('f-search').value = '';
  applyFilters();
}

// ─── RENDER ───────────────────────────────────────────────────────
function render() {
  const total = filtered.length;
  const pages = Math.ceil(total / PER_PAGE) || 1;
  const start = (page - 1) * PER_PAGE;
  const end = Math.min(start + PER_PAGE, total);
  const slice = filtered.slice(start, end);

  document.getElementById('results-count').textContent = total + ' resultado' + (total!==1?'s':'');
  document.getElementById('total-count').textContent = total;
  document.getElementById('toolbar-title').textContent =
    total === 0 ? 'Sin resultados' :
    `Mostrando ${start+1}–${end} de ${total} obra${total!==1?'s':''}`;

  const grid = document.getElementById('cards-grid');
  if (total === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="icon">🏛</div>
      <h3>No se encontraron resultados</h3>
      <p>Prueba a modificar los filtros</p>
    </div>`;
  } else {
    grid.innerHTML = slice.map(cardHTML).join('');
  }
  renderPagination(pages);
}

function cardHTML(m) {
  return `<div class="card" onclick="openModal(${m.id})">
    <div><span class="card-num">Nº ${m.id}</span></div>
    <div class="card-body">
      <div class="card-title">${m.nombre}</div>
      <div class="card-tags">
        ${m.tema&&m.tema!=='—'?`<span class="tag tag-tema">${m.tema.length>32?m.tema.slice(0,30)+'…':m.tema}</span>`:''}
        ${m.estilo&&m.estilo!=='—'?`<span class="tag tag-estilo">${m.estilo.length>32?m.estilo.slice(0,30)+'…':m.estilo}</span>`:''}
        ${m.provincia&&m.provincia!=='—'?`<span class="tag tag-prov">${m.provincia}</span>`:''}
      </div>
      ${m.municipio&&m.municipio!=='—'?`<div class="card-muni">📍 <span>${m.municipio}</span></div>`:''}
      ${m.autor&&m.autor!=='—'?`<div class="card-autor">✏️ ${m.autor}</div>`:''}
      ${m.descripcion?`<div class="card-desc">${m.descripcion}</div>`:''}
    </div>
  </div>`;
}

function renderPagination(pages) {
  ['pagination-top','pagination-bottom'].forEach(id => {
    const el = document.getElementById(id);
    if (pages <= 1) { el.innerHTML = ''; return; }
    let html = `<button onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹ Ant.</button>`;
    let nums = [];
    if (pages <= 7) { for(let i=1;i<=pages;i++) nums.push(i); }
    else {
      nums=[1];
      if(page>3) nums.push('…');
      for(let i=Math.max(2,page-1);i<=Math.min(pages-1,page+1);i++) nums.push(i);
      if(page<pages-2) nums.push('…');
      nums.push(pages);
    }
    nums.forEach(n => {
      if(n==='…') html+=`<button disabled>…</button>`;
      else html+=`<button class="${n===page?'active':''}" onclick="goPage(${n})">${n}</button>`;
    });
    html += `<button onclick="goPage(${page+1})" ${page===pages?'disabled':''}>Sig. ›</button>`;
    el.innerHTML = html;
  });
}

function goPage(p) { page=p; render(); window.scrollTo({top:0,behavior:'smooth'}); }

// ─── MODAL ────────────────────────────────────────────────────────
function openModal(id) {
  const m = MONUMENTOS.find(x => x.id === id);
  if (!m) return;

  document.getElementById('m-num').textContent = 'Ficha Nº ' + m.id;
  document.getElementById('m-title').textContent = m.nombre;

  const fields = [
    ['Tema / Período', m.tema],
    ['Estilo / Época', m.estilo],
    ['Provincia', m.provincia],
    ['Municipio', m.municipio],
    ['Autor / Arquitecto', m.autor]
  ];
  document.getElementById('m-info').innerHTML = fields
    .filter(([,v]) => v && v !== '—')
    .map(([l,v]) => `<div class="info-item"><label>${l}</label><p>${v}</p></div>`)
    .join('');

  document.getElementById('m-desc').textContent = m.descripcion || 'Sin descripción disponible.';

  document.getElementById('modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';

  // Destroy previous maps
  if (mapAndalucia) { mapAndalucia.remove(); mapAndalucia = null; }
  if (mapMuni) { mapMuni.remove(); mapMuni = null; }

  // Load image
  loadIAPHImage(m);

  // Load maps after DOM ready
  setTimeout(() => {
    initAndaluciaMap(m);
    initMuniMap(m.municipio, m.provincia);
  }, 80);
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  document.body.style.overflow = '';
  if (mapAndalucia) { mapAndalucia.remove(); mapAndalucia = null; }
  if (mapMuni) { mapMuni.remove(); mapMuni = null; }
}

function closeModalOutside(e) { if(e.target.id==='modal') closeModal(); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ─── IMAGE: CGPHA ─────────────────────────────────────────────────
function loadIAPHImage(m) {
  const container = document.getElementById('m-img-container');
  
  if (m.img_url) {
    // Test if image loads, otherwise show placeholder
    container.className = 'img-wrap';
    container.innerHTML = `
      <img src="${m.img_url}" alt="${esc(m.nombre)}" class="monument-img"
        onerror="showNoImage(this.parentNode, '${esc(m.nombre)}')"
        onload="">
      <div class="img-caption">
        📷 Catálogo General del Patrimonio Histórico de Andalucía · IAPH
      </div>`;
  } else {
    showNoImage(container, m.nombre);
  }
}

function showNoImage(container, nombre) {
  container.className = 'img-placeholder';
  container.innerHTML = `
    <div class="ph-icon">🏛</div>
    <div class="ph-text">Imagen no disponible</div>
    <div class="ph-sub">${esc(nombre)}</div>`;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─── MAP: ANDALUCÍA CON MUNICIPIOS ────────────────────────────────
function initAndaluciaMap(m) {
  const el = document.getElementById('map-andalucia');
  el.style.height = '220px';

  mapAndalucia = L.map('map-andalucia', {
    zoomControl: false, attributionControl: false,
    dragging: false, scrollWheelZoom: false,
    doubleClickZoom: false, boxZoom: false, keyboard: false
  });

  // Draw province boundaries as backdrop
  const provLayer = L.geoJSON(ANDALUCIA_GEOJSON, {
    style: () => ({
      fillColor: '#e8f5ee', fillOpacity: 0.7,
      color: '#007932', weight: 1.5, opacity: 0.8
    })
  }).addTo(mapAndalucia);

  mapAndalucia.fitBounds(provLayer.getBounds(), {padding:[6,6]});

  // Parse municipality names (can be multiple separated by / or commas)
  const muniRaw = m.municipio;
  const targets = parseMultiMuni(muniRaw);

  if (!muniRaw || muniRaw === '—' || targets.length === 0) {
    // No municipality known - add text overlay
    addMapNote(el, 'Municipio no especificado');
    return;
  }

  // Plot municipality markers
  let plotted = 0;
  const bounds = [];

  targets.forEach(muniName => {
    const c = getMuniCenter(muniName);
    if (c) {
      const marker = L.circleMarker([c.lat, c.lon], {
        radius: 8, fillColor: '#c8952a', color: '#5c2d0e',
        weight: 2, fillOpacity: 0.95
      }).addTo(mapAndalucia);
      marker.bindTooltip(muniName, {permanent: false, className: 'muni-tooltip'});
      bounds.push([c.lat, c.lon]);
      plotted++;
    }
  });

  if (plotted > 0 && bounds.length > 0) {
    if (bounds.length === 1) {
      mapAndalucia.setView(bounds[0], mapAndalucia.getZoom());
    } else {
      mapAndalucia.fitBounds(bounds, {padding:[20,20]});
    }
  } else if (plotted === 0) {
    addMapNote(el, 'Ubicación no disponible en el mapa');
  }
}

function parseMultiMuni(raw) {
  if (!raw || raw === '—') return [];
  // Split by common separators
  const parts = raw.split(/[\/,;]/).map(s => s.split('(')[0].trim()).filter(s => s.length > 1);
  return [...new Set(parts)];
}

function addMapNote(el, text) {
  const div = document.createElement('div');
  div.style.cssText = 'position:absolute;bottom:8px;left:8px;right:8px;background:rgba(255,255,255,.85);padding:5px 8px;border-radius:4px;font-size:.75rem;z-index:1000;text-align:center;color:#555;font-family:Montserrat,sans-serif';
  div.textContent = text;
  el.appendChild(div);
}

// ─── MAP: MUNICIPALITY ZOOM ───────────────────────────────────────
function initMuniMap(municipio, provincia) {
  const el = document.getElementById('map-muni');
  el.style.height = '220px';

  const targets = parseMultiMuni(municipio);

  if (!municipio || municipio === '—' || targets.length === 0) {
    // Show text note instead of map
    document.getElementById('map-muni-container').innerHTML = `
      <div class="no-muni-note">
        <span>📍</span>
        <div>Municipio no especificado para esta obra</div>
      </div>`;
    return;
  }

  mapMuni = L.map('map-muni', {zoomControl: true, attributionControl: true});

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(mapMuni);

  const markerIcon = L.divIcon({
    html: '<div style="background:#007932;width:12px;height:12px;border-radius:50%;border:2.5px solid #005a25;box-shadow:0 2px 6px rgba(0,0,0,.35)"></div>',
    iconSize:[12,12], iconAnchor:[6,6], className:''
  });

  const bounds = [];
  targets.forEach(muniName => {
    const c = getMuniCenter(muniName);
    if (c) {
      L.marker([c.lat, c.lon], {icon: markerIcon}).addTo(mapMuni)
        .bindPopup(`<strong style="font-family:Montserrat,sans-serif">${muniName}</strong><br><small>${provincia||''}</small>`);
      bounds.push([c.lat, c.lon]);
    }
  });

  if (bounds.length === 1) {
    mapMuni.setView(bounds[0], 11);
  } else if (bounds.length > 1) {
    mapMuni.fitBounds(bounds, {padding:[30,30]});
  } else {
    mapMuni.setView([37.4, -4.5], 7);
    addMapNote(el, 'Ubicación no disponible');
  }
}

// ─── START ────────────────────────────────────────────────────────
init();
</script>
